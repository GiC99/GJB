<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜欢的美食</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f5f7;padding:20px 15px;}
        .back{display:inline-block;margin-bottom:20px;color:#007aff;text-decoration:none;}
        h2{text-align:center;margin-bottom:30px;color:#222;}
        .food-list{max-width:600px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
        .food-img{width:100%;border-radius:8px;box-shadow:0 2px 6px #ddd;}
        .food-name{text-align:center;margin-top:6px;font-size:14px;color:#444;}
    </style>
</head>
<body>
    <a href=" " class="back">← 返回首页</a >
    <h2>我的美食收藏</h2>
    <div class="food-list">
        <div class="food-item">
            < img src="food1.jpg" class="food-img">
            <p class="food-name">美食1</p >
        </div>
        <div class="food-item">
            < img src="food2.jpg" class="food-img">
            <p class="food-name">美食2</p >
        </div>
    </div>
</body>
</html>

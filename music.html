<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜欢的音乐</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f5f7;padding:20px 15px;}
        .back{display:inline-block;margin-bottom:20px;color:#007aff;text-decoration:none;font-size:22px;}
        h2{text-align:center;margin-bottom:40px;color:#222;font-size:36px;}
        /* 改用flex布局，强制两张图居中、等大 */
        .music-list{
            max-width:650px;
            margin:0 auto;
            display:flex;
            justify-content:center;
            gap:40px;
        }
        .music-card{
            text-decoration:none;
            width:240px; /* 固定卡片宽度，两张完全一样大 */
        }
        .music-img{
            width:100%;
            height:240px; /* 固定高度，封面大小统一 */
            border-radius:8px;
            object-fit:cover;
            box-shadow:0 2px 6px #ddd;
        }
        .music-name{
            text-align:center;
            margin-top:12px;
            font-size:20px;
            color:#222;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">返回首页</a>
    <h2>我的音乐收藏</h2>
    <div class="music-list">
        <a href="https://myfreemp3xz.com/music/3291.html" target="_blank" class="music-card">
            <img src="music1.jpg" class="music-img" alt="江南">
            <p class="music-name">江南</p>
        </a>
        <a href="https://myfreemp3xz.com/music/168189.html" target="_blank" class="music-card">
            <img src="music2.jpg" class="music-img" alt="爱琴海">
            <p class="music-name">爱琴海</p>
        </a>
    </div>
</body>
</html>

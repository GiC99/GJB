<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏小屋</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei", sans-serif;}
        body{background:#f5f5f7;padding:30px 15px;}
        .user-info{text-align:center;margin-bottom:50px;}
        .avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 10px #ccc;}
        .nickname{font-size:24px;margin:15px 0 8px;color:#222;}
        .desc{color:#888;font-size:14px;}
        .nav-box{max-width:500px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:20px;}
        .nav-item{padding:25px;background:#fff;border-radius:12px;text-align:center;font-size:18px;color:#333;
            text-decoration:none;box-shadow:0 2px 8px #eee;transition:0.3s;}
        .nav-item:hover{transform:scale(1.02);box-shadow:0 4px 15px #ddd;}
    </style>
</head>
<body>
    <div class="user-info">
        <img src="avatar.jpg" class="avatar">
        <h2 class="nickname">你的昵称</h2>
        <p class="desc">影音美食｜私人收藏日记</p >
    </div>

    <div class="nav-box">
        <a href=" " class="nav-item">🎵 我喜欢的音乐</a >
        <a href="movie.html" class="nav-item">🎬 我喜欢的电影</a >
        <a href="food.html" class="nav-item">🍜 我喜欢的美食</a >
    </div>
</body>
</html>
